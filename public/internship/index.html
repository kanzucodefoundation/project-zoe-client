<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Zoe Internship</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      line-height: 1.7;
    }

    header {
      background: #1e3a5f;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header img {
      height: 36px;
    }

    header span {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    .container {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 24px 80px;
    }

    #content h1 { font-size: 1.75rem; margin-top: 0; color: #1e3a5f; }
    #content h2 { font-size: 1.2rem; margin-top: 2rem; color: #1e3a5f; }
    #content h3 { font-size: 1rem; }

    #content a {
      color: #1d6fa8;
      text-decoration: none;
    }
    #content a:hover { text-decoration: underline; }

    #content ul, #content ol {
      padding-left: 1.4em;
    }

    #content li { margin-bottom: 4px; }

    #content strong { color: #111827; }

    #content code {
      background: #e5e7eb;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    #content hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 2rem 0;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      color: #1d6fa8;
      font-size: 0.9rem;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }

    #loading {
      color: #6b7280;
      margin-top: 48px;
      text-align: center;
    }

    #error {
      color: #b91c1c;
      margin-top: 48px;
    }
  </style>
</head>
<body>
  <header>
    <img src="/projectZoe-logos_transparent.png" alt="Project Zoe" />
    <span>Internship Programme</span>
  </header>

  <div class="container">
    <div id="loading">Loading…</div>
    <div id="error" style="display:none"></div>
    <div id="nav" style="display:none">
      <a class="back-link" href="?page=README">&larr; Back to overview</a>
    </div>
    <div id="content"></div>
  </div>

  <script>
    const PAGE_MAP = {
      README: 'README.md',
      coding: 'coding.md',
      qa: 'qa.md',
      'data-cleanup': 'data-cleanup.md',
      'user-training': 'user-training.md',
    };

    function getPage() {
      const params = new URLSearchParams(window.location.search);
      const p = params.get('page') || 'README';
      return PAGE_MAP[p] ? p : 'README';
    }

    function rewriteLinks(html) {
      return html.replace(
        /href="\.\/([^"]+)\.md"/g,
        (_, name) => `href="?page=${name}"`
      );
    }

    async function render() {
      const page = getPage();
      const file = PAGE_MAP[page];

      document.getElementById('nav').style.display = page !== 'README' ? 'block' : 'none';

      try {
        const res = await fetch(`./${file}`);
        if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
        const md = await res.text();
        const raw = marked.parse(md);
        document.getElementById('content').innerHTML = rewriteLinks(raw);
        document.getElementById('loading').style.display = 'none';

        const h1 = document.querySelector('#content h1');
        if (h1) document.title = h1.textContent + ' — Project Zoe';
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').textContent = 'Could not load page: ' + err.message;
      }
    }

    render();
  </script>
</body>
</html>
